---
# cPanel Git Version Control deployment file.
#
# When you click "Deploy HEAD Commit" in cPanel → Git Version Control,
# this file runs. It copies the theme into wp-content/themes/djfranco/
# on the live site, excluding repo cruft.
#
# Each task line runs in its OWN shell, so we can't `export` a variable
# on one line and reuse it on the next — every path is inlined.
#
# Edit the path below if your WordPress isn't at /public_html/.
# (Examples: site in a subfolder → /public_html/blog/, addon domain →
# /public_html/djfrancolive.com/)

deployment:
  tasks:
    - /bin/mkdir -p $HOME/public_html/wp-content/themes/djfranco/
    - /usr/bin/rsync -av --delete --exclude='.git' --exclude='.github' --exclude='.claude' --exclude='.vscode' --exclude='.idea' --exclude='node_modules' --exclude='wp-updates' --exclude='deploy.yml.example' --exclude='.cpanel.yml' --exclude='*.md' --exclude='Thumbs.db' --exclude='.DS_Store' $HOME/repositories/djfrancolive-site/ $HOME/public_html/wp-content/themes/djfranco/
